trigger:
  branches:
    include:
      - main

# Manual runs: use "Run pipeline" in Azure DevOps UI to target any branch.
# Set deployEnabled to false for a compile+test-only run.

parameters:
  - name: deployEnabled
    displayName: Deploy after tests
    type: boolean
    default: true

variables:
  PIPELINE_MODE: azure

stages:
  - stage: Compile
    displayName: Compile
    jobs:
      - job: Build
        displayName: Build backend + frontend
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: UseDotNet@2
            displayName: Use .NET 10
            inputs:
              packageType: sdk
              version: 10.x

          - task: NodeTool@0
            displayName: Use Node 20 (for frontend when present)
            inputs:
              versionSpec: 20.x

          - bash: scripts/stage-compile.sh
            displayName: Stage 1 — Compile
            env:
              PIPELINE_MODE: $(PIPELINE_MODE)

  - stage: UnitTest
    displayName: Unit Test
    dependsOn: Compile
    jobs:
      - job: Test
        displayName: Run unit tests
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: UseDotNet@2
            displayName: Use .NET 10
            inputs:
              packageType: sdk
              version: 10.x

          - task: NodeTool@0
            displayName: Use Node 20 (for frontend when present)
            inputs:
              versionSpec: 20.x

          - bash: scripts/stage-compile.sh
            displayName: Restore + build (no-build for test requires prior build)
            env:
              PIPELINE_MODE: $(PIPELINE_MODE)

          - bash: scripts/stage-test.sh
            displayName: Stage 2 — Unit Test
            env:
              PIPELINE_MODE: $(PIPELINE_MODE)
              AGENT_TEMPDIRECTORY: $(Agent.TempDirectory)

          - task: PublishTestResults@2
            displayName: Publish test results
            condition: always()
            inputs:
              testResultsFormat: VSTest
              testResultsFiles: '**/*.trx'
              searchFolder: $(Agent.TempDirectory)

  - stage: Architecture
    displayName: Architecture Standards
    dependsOn: UnitTest
    jobs:
      - job: ArchTest
        displayName: Enforce architecture standards (ARCH-1..4)
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: UseDotNet@2
            displayName: Use .NET 10
            inputs:
              packageType: sdk
              version: 10.x

          - bash: scripts/stage-arch.sh
            displayName: Stage 2b — Architecture
            env:
              PIPELINE_MODE: $(PIPELINE_MODE)
              AGENT_TEMPDIRECTORY: $(Agent.TempDirectory)

          - task: PublishTestResults@2
            displayName: Publish architecture results
            condition: always()
            inputs:
              testResultsFormat: VSTest
              testResultsFiles: '**/*.trx'
              searchFolder: $(Agent.TempDirectory)

  - stage: Deploy
    displayName: Deploy
    dependsOn: Architecture
    condition: and(succeeded(), eq('${{ parameters.deployEnabled }}', true))
    jobs:
      - deployment: DeployApp
        displayName: Deploy application
        pool:
          vmImage: ubuntu-latest
        # Replace 'production' with your Azure DevOps environment name when ready.
        # Environments enable approval gates and deployment history.
        environment: production
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - bash: scripts/stage-deploy.sh
                  displayName: Stage 3 — Deploy
                  env:
                    PIPELINE_MODE: $(PIPELINE_MODE)
                    # Uncomment and populate via a variable group when Azure target is chosen:
                    # ACR_LOGIN_SERVER: $(ACR_LOGIN_SERVER)
                    # ACR_USERNAME: $(ACR_USERNAME)
                    # ACR_PASSWORD: $(ACR_PASSWORD)
                    # AZURE_RESOURCE_GROUP: $(AZURE_RESOURCE_GROUP)
                    # AZURE_APP_NAME: $(AZURE_APP_NAME)
                    # BUILD_ID: $(Build.BuildId)

  - stage: Cucumber
    displayName: Cucumber Tests
    dependsOn: Deploy
    condition: always()
    jobs:
      - job: CucumberPlaceholder
        displayName: Cucumber (placeholder)
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: UseDotNet@2
            displayName: Use .NET 10
            inputs:
              packageType: sdk
              version: 10.x

          - bash: scripts/stage-cucumber.sh
            displayName: Stage 4 — Cucumber (@backend specs, Reqnroll)
            env:
              PIPELINE_MODE: $(PIPELINE_MODE)
              AGENT_TEMPDIRECTORY: $(Agent.TempDirectory)

  - stage: Playwright
    displayName: Playwright E2E (frontend + story)
    dependsOn: Cucumber
    condition: always()
    jobs:
      - job: PlaywrightBdd
        displayName: Playwright-BDD (@frontend + @story specs)
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: NodeTool@0
            displayName: Use Node 20
            inputs:
              versionSpec: 20.x

          - bash: scripts/stage-playwright.sh
            displayName: Stage 5 — Playwright E2E
            env:
              PIPELINE_MODE: $(PIPELINE_MODE)

          - task: PublishTestResults@2
            displayName: Publish Playwright results
            condition: always()
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: 'tests/acceptance/playwright/test-results/results.xml'
